<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f1f22">
  <title>NanoBot.net Workbench</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="rail">
      <div class="brand-mark">N</div>
      <button class="rail-button active" data-view="chat" data-i18n="railChat" title="对话">聊</button>
      <button class="rail-button" data-view="files" data-i18n="railFiles" title="文件">文</button>
      <button class="rail-button" data-view="tools" data-i18n="railTools" title="工具">工</button>
      <button class="rail-button" data-view="memory" data-i18n="railMemory" title="记忆">忆</button>
    </aside>

    <aside class="sidebar">
      <header class="sidebar-header">
        <div>
          <div class="eyebrow" data-i18n="product">NanoBot.net</div>
          <h1 data-i18n="workbench">Agent 工作台</h1>
        </div>
        <div class="header-actions">
          <button id="themeToggle" class="mini-button" type="button">浅色</button>
          <button id="languageToggle" class="icon-button wide" type="button">EN</button>
        </div>
      </header>

      <section class="panel-block mode-block">
        <div class="mode-tabs">
          <button class="mode-tab active" type="button" data-i18n="modeAgent">Agent</button>
          <button class="mode-tab" type="button" data-i18n="modeWrite">写作</button>
        </div>
        <div class="quick-actions">
          <button id="newSession" class="quick-action" type="button"><span>+</span><span data-i18n="newSession">新建</span></button>
          <button id="refreshFiles" class="quick-action" type="button"><span>↻</span><span data-i18n="refresh">刷新</span></button>
        </div>
      </section>

      <section class="panel-block">
        <div class="section-head">
          <div class="section-title" data-i18n="sessions">会话</div>
          <span class="section-count" id="sessionCount">0</span>
        </div>
        <div id="sessions" class="session-list"></div>
      </section>

      <section class="panel-block">
        <div class="section-head">
          <div class="section-title" data-i18n="workspaceFiles">工作区文件</div>
          <span class="section-count" data-i18n="localFiles">本地</span>
        </div>
        <div id="filePath" class="path-chip"></div>
        <div id="fileList" class="file-list"></div>
      </section>

      <section class="panel-block">
        <div class="section-title" data-i18n="runtime">运行时</div>
        <dl class="runtime-list">
          <div><dt data-i18n="status">状态</dt><dd id="runtimeStatus">Loading</dd></div>
          <div><dt data-i18n="model">模型</dt><dd id="runtimeModel">Loading</dd></div>
          <div><dt data-i18n="workspace">工作区</dt><dd id="runtimeWorkspace">Loading</dd></div>
          <div><dt>Nong</dt><dd id="runtimeNong">Loading</dd></div>
        </dl>
        <div id="runtimeNotice" class="runtime-notice" hidden></div>
      </section>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <div class="eyebrow" data-i18n="localRuntime">本地 Agent 运行时</div>
          <h2 id="sessionTitle">NanoBot 会话</h2>
        </div>
        <div class="status-strip">
          <span id="runtimeReadyPill" class="status-pill">Loading</span>
          <span id="runtimeModelPill" class="status-pill muted">Model</span>
          <span id="runtimeNongPill" class="status-pill muted">Nong</span>
        </div>
        <div class="topbar-actions">
          <button id="reloadStatus" class="secondary-button" type="button" data-i18n="reload">重载</button>
          <a class="secondary-button" href="/api/runtime/status" target="_blank" data-i18n="statusJson">状态 JSON</a>
        </div>
      </header>

      <section id="messages" class="messages"></section>

      <form id="composer" class="composer">
        <div class="composer-card">
          <textarea id="prompt" rows="3" placeholder="输入下一步要 NanoBot 做的事情..."></textarea>
          <div class="composer-footer">
            <div class="composer-hints">
              <span id="composerModel">NanoBot</span>
              <span>·</span>
              <span data-i18n="composerHint">输入 / 可组织任务</span>
            </div>
            <button id="sendButton" type="submit" disabled data-i18n="send">发送</button>
          </div>
        </div>
      </form>
    </main>

    <aside class="inspector">
      <section class="inspector-section plan-section">
        <div class="section-title" data-i18n="plan">计划</div>
        <div class="plan-card">
          <strong data-i18n="noActivePlan">暂无活动计划</strong>
          <span data-i18n="planHint">发送任务后，工具调用和会话进展会在这里沉淀。</span>
        </div>
      </section>
      <section class="inspector-section todo-section">
        <div class="section-title" data-i18n="todos">待办</div>
        <div class="todo-list">
          <div class="todo-item"><span></span><span data-i18n="todoRuntime">确认运行时就绪</span></div>
          <div class="todo-item"><span></span><span data-i18n="todoFiles">选择工作区上下文</span></div>
          <div class="todo-item"><span></span><span data-i18n="todoSend">发送下一步任务</span></div>
        </div>
      </section>
      <section class="inspector-section">
        <div class="section-title" data-i18n="toolTimeline">工具时间线</div>
        <div id="events" class="event-list"></div>
      </section>
      <section class="inspector-section">
        <div class="section-title" data-i18n="toolDetail">工具详情</div>
        <div id="toolDetail" class="tool-detail"></div>
      </section>
      <section class="inspector-section">
        <div class="section-title" data-i18n="filePreview">文件预览</div>
        <div id="filePreviewTitle" class="preview-title"></div>
        <pre id="filePreview" class="file-preview"></pre>
      </section>
      <section class="inspector-section">
        <div class="section-title" data-i18n="memoryPreview">记忆预览</div>
        <pre id="memoryPreview" class="memory-preview">Loading</pre>
      </section>
    </aside>
  </div>

  <script src="/app.js"></script>
</body>
</html>
