name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish CLI
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - linux-x64
          - osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish ${{ matrix.rid }}
        run: >
          dotnet publish Nanobot.CLI/Nanobot.CLI.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output artifacts/nanobot-${{ matrix.rid }}
          /p:PublishSingleFile=true

      - name: Archive ${{ matrix.rid }}
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          Compress-Archive -Path "artifacts/nanobot-$rid/*" -DestinationPath "artifacts/nanobot-$rid.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanobot-${{ matrix.rid }}
          path: artifacts/nanobot-${{ matrix.rid }}.zip

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/nanobot-${{ matrix.rid }}.zip
